<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Export Status Poster</title>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1080px;height:1920px;overflow:hidden;background:#0b1a1c}
.poster{position:relative;width:1080px;height:1920px;color:#fff;font-family:Epilogue,system-ui,sans-serif}
.bg{position:absolute;inset:0;background:
  linear-gradient(180deg,rgba(11,26,28,.55) 0%,rgba(11,26,28,.18) 26%,rgba(11,26,28,.35) 52%,rgba(11,26,28,.88) 74%,#0b1a1c 100%),
  url('../images/hero-workshop-1280w.webp') center/cover no-repeat}
.content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;padding:72px 56px 56px}
.brand{display:grid;justify-items:start;gap:14px}
.brand-row{display:flex;align-items:center;gap:18px}
.brand-mark{width:96px;height:96px;border-radius:20px;flex-shrink:0;background:#101828;display:grid;place-items:center}
.brand-mark svg{width:72px;height:72px;display:block}
.brand-name{font-size:46px;font-weight:800;letter-spacing:-.03em;line-height:1}
.brand-name small{display:block;font-size:18px;font-weight:600;letter-spacing:.22em;margin-top:6px;opacity:.9}
.brand-tag{font-size:16px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(247,250,249,.78);margin-top:8px}
.spacer{flex:1}
.message{padding:0 0 48px}
.message h1{font-size:64px;font-weight:800;letter-spacing:-.03em;line-height:1.06;max-width:10ch;margin:0 0 20px}
.message p{font-size:26px;font-weight:500;line-height:1.4;color:rgba(247,250,249,.9);max-width:22ch}
.cta{display:grid;gap:16px}
.cta-bar{width:100%;display:flex;align-items:center;justify-content:center;gap:14px;min-height:96px;padding:22px 28px;background:#0d7a55;border-radius:18px;font-size:28px;font-weight:700}
.cta-bar svg{width:36px;height:36px;flex-shrink:0}
.cta small{text-align:center;font-size:15px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(247,250,249,.7)}
</style>
</head>
<body>
<article class="poster">
  <div class="bg" aria-hidden="true"></div>
  <div class="content">
    <div class="brand">
      <div class="brand-row">
        <div class="brand-mark" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <rect width="64" height="64" rx="10" fill="#101828"/>
            <path d="M14 18h36v8H36v24h-8V26H14z" fill="#82efe5"/>
            <path d="M42 32h8v18H30v-7h12z" fill="#0b6fd3"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">TECHLAB<small>BOTSWANA</small></div>
          <div class="brand-tag">IT · CCTV · POS · Websites</div>
        </div>
      </div>
    </div>
    <div class="spacer" aria-hidden="true"></div>
    <div class="message">
      <h1>Technology support for Botswana.</h1>
      <p>Hands-on IT help from Mahalapye — nationwide.</p>
    </div>
    <div class="cta">
      <div class="cta-bar">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2zm0 1.8c2.17 0 4.21.85 5.75 2.38a8.08 8.08 0 0 1 2.37 5.73c0 4.48-3.65 8.12-8.12 8.12-1.42 0-2.8-.37-4.02-1.07l-.29-.17-3.12.82.83-3.04-.18-.31a8.1 8.1 0 0 1-1.24-4.35c0-4.48 3.65-8.11 8.12-8.11zm4.52 10.05c-.25-.12-1.47-.72-1.7-.81-.23-.08-.39-.12-.56.12-.17.25-.64.81-.79.97-.14.17-.29.19-.54.06-.25-.12-1.05-.39-2-1.23-.74-.66-1.24-1.47-1.39-1.72-.14-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.12-.14.17-.25.25-.41.08-.17.04-.31-.02-.43-.06-.12-.56-1.35-.77-1.85-.2-.48-.41-.42-.56-.42h-.48c-.17 0-.43.06-.66.31-.23.25-.87.85-.87 2.07 0 1.22.89 2.4 1.01 2.56.12.17 1.75 2.67 4.24 3.74.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.07.14-1.18-.06-.11-.23-.17-.48-.29z"/></svg>
        <span>WhatsApp us · +267 76 984 827</span>
      </div>
      <small>Mahalapye · Nationwide Botswana</small>
    </div>
  </div>
</article>
</body>
</html>
